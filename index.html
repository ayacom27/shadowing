<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シャドーイング 音変化トレーナー</title>
<style>
  :root{
    --orange:#E8821E;
    --link:#2563eb; --del:#dc2626; --flap:#16a34a; --weak:#9333ea;
    --bg:#fafafa; --gray:#666; --flapgray:#9aa0a6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg);color:#222;line-height:1.5;}
  header{background:var(--orange);color:#fff;padding:9px 14px;position:sticky;top:0;z-index:20;
    box-shadow:0 2px 6px rgba(0,0,0,.15);}
  header h1{margin:0;font-size:15px;font-weight:700;}
  header p{margin:1px 0 0;font-size:10px;opacity:.9;}
  .wrap{max-width:640px;margin:0 auto;padding:10px;}
  textarea,input[type=text]{width:100%;border:1.5px solid #ccc;border-radius:9px;padding:10px;
    font-size:15px;font-family:inherit;}
  textarea{min-height:110px;resize:vertical;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:9px;font-weight:700;}
  .btn-primary{background:var(--orange);color:#fff;padding:11px 16px;font-size:14px;width:100%;}
  .btn-primary:active{opacity:.85;}
  .btn-ghost{background:#fff;border:1.5px solid var(--orange);color:var(--orange);padding:9px 12px;font-size:13px;}
  .card{background:#fff;border-radius:11px;padding:10px 11px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.06);}

  .tabs{display:flex;gap:8px;margin:10px 0 8px;}
  .tabs button{flex:1;padding:8px;background:#eee;color:#555;font-size:13px;border-radius:9px;}
  .tabs button.active{background:var(--orange);color:#fff;}

  /* ツールバー（各チャンクの上） */
  .toolbar{padding:0 0 5px;display:flex;gap:4px;flex-wrap:nowrap;}
  .tbtn{flex:1;min-width:0;padding:6px 2px;font-size:10px;border:1.5px solid #ddd;background:#fff;color:#444;border-radius:8px;position:relative;user-select:none;line-height:1.2;}
  .tbtn .s{font-size:14px;display:block;margin-bottom:0;}
  .tbtn.hasrule::after{content:"?";position:absolute;top:2px;right:4px;font-size:8px;color:#bbb;}
  .tbtn.active{font-weight:800;transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.28);}
  .tbtn.active::before{content:"●";position:absolute;top:2px;left:4px;font-size:7px;color:#fff;}
  .tbtn.active.t-link{background:var(--link);color:#fff;border-color:transparent;}
  .tbtn.active.t-del{background:var(--del);color:#fff;border-color:transparent;}
  .tbtn.active.t-flap{background:var(--flap);color:#fff;border-color:transparent;}
  .tbtn.active.t-weak{background:var(--weak);color:#fff;border-color:transparent;}
  .tbtn.active.t-erase{background:#555;color:#fff;border-color:transparent;}
  .sel-label{font-size:11px;color:#666;margin:-1px 0 7px;}
  .sel-label b{font-size:12px;}

  /* ルールのポップアップ */
  .popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;
    align-items:center;justify-content:center;padding:24px;}
  .popup-overlay.show{display:flex;}
  .popup-card{background:#fff;border-radius:16px;padding:18px;max-width:340px;width:100%;
    box-shadow:0 10px 40px rgba(0,0,0,.3);}
  .popup-card .ttl{font-size:19px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .popup-card .ttl .sym{font-size:24px;}
  .popup-card .rl{font-size:14px;line-height:1.6;}
  .popup-card .ex{margin-top:9px;font-size:13px;color:var(--gray);background:#f7f7f7;border-radius:10px;padding:9px;}
  .popup-card .cl{margin-top:12px;text-align:center;}
  .popup-card .cl button{background:var(--orange);color:#fff;padding:8px 20px;font-size:13px;}

  .chunk-num{font-size:10px;color:var(--gray);font-weight:700;margin-bottom:3px;}
  .chunk-text{font-size:19px;line-height:2;letter-spacing:.2px;}
  .tok{position:relative;cursor:pointer;border-radius:3px;display:inline-block;}

  /* 連結 */
  .m-link{border-bottom:3px solid var(--link);background:rgba(37,99,235,.08);border-radius:5px;}
  .gap{display:inline-block;width:10px;text-align:center;color:#cbcbcb;cursor:pointer;font-weight:700;user-select:none;font-size:17px;}
  .gap.link-on{color:var(--link);font-size:28px;line-height:.4;vertical-align:-6px;}

  /* 消失 */
  .paren{color:var(--del);font-weight:800;font-size:.9em;vertical-align:1px;}
  .m-del-char{color:var(--del);opacity:.4;}

  /* フラップt: 弱く発音 → グレー＋白フチ */
  .m-flap{color:var(--flapgray);font-weight:400;text-shadow:0 0 1px #fff,0 0 2px #fff;border-bottom:2px dotted var(--flap);}

  /* 弱形 */
  .m-weak{text-decoration:underline wavy var(--weak);text-decoration-thickness:2px;text-underline-offset:4px;}

  .actions{display:flex;gap:8px;margin-top:9px;}
  .actions button{flex:1;padding:9px;font-size:13px;}
  .btn-check{background:var(--orange);color:#fff;}
  .btn-reveal{background:#fff;border:1.5px solid #bbb;color:#555;}
  .result{font-size:12px;margin-top:8px;padding:8px 10px;border-radius:8px;}
  .result.ok{background:#e7f6ec;color:#137a36;}
  .result.miss{background:#fdeaea;color:#b42424;}
  .result ul{margin:5px 0 0;padding-left:16px;}

  .hidden{display:none;}
  details{margin-top:7px;} summary{font-size:12px;color:var(--orange);cursor:pointer;}
  .toolnote{font-size:11px;color:var(--gray);}

  /* 保存リスト */
  .saved-row{display:flex;align-items:center;gap:6px;padding:6px;border:1px solid #eee;border-radius:9px;margin-bottom:7px;background:#fff;}
  .saved-row .nm{flex:1;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .saved-row .meta{font-size:10px;color:#999;font-weight:400;}
  .iconbtn{background:#f0f0f0;color:#555;padding:6px 8px;font-size:12px;border-radius:7px;}
  .iconbtn.danger{background:#fdecec;color:var(--del);}
  .iconbtn.go{background:var(--orange);color:#fff;}
  .sec-title{font-size:12px;font-weight:700;color:#555;margin:14px 0 7px;}
</style>
</head>
<body>

<div id="popup" class="popup-overlay" onclick="hidePopup()">
  <div class="popup-card" onclick="event.stopPropagation()" id="popupCard"></div>
</div>

<header>
  <h1>シャドーイング 音変化トレーナー</h1>
  <p>連結・消失・フラップt・弱形 を判定 / スクリプトを保存して練習</p>
</header>

<div class="wrap">

  <!-- INPUT -->
  <div id="inputView">
    <div class="card">
      <input type="text" id="scriptName" placeholder="タイトル（任意）例: Lesson 3 会話" style="margin-bottom:8px">
      <textarea id="scriptInput" placeholder="ここに英語スクリプトを貼り付け&#10;例: I'd like to stand up and take care of it. Could you give it to him?"></textarea>
      <div style="height:9px"></div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary" style="flex:2" onclick="saveAndStart()">保存して開始</button>
        <button class="btn-ghost" style="flex:1" onclick="startOnly()">保存せず開始</button>
      </div>
      <details>
        <summary>サンプルを入れる</summary>
        <div style="margin-top:8px"><button class="btn-ghost" onclick="useSample()">サンプル文をセット</button></div>
      </details>
    </div>
    <div id="savedListWrap"></div>
  </div>

  <!-- PRACTICE -->
  <div id="practiceView" class="hidden">
    <div class="tabs">
      <button id="tabStudy" class="active" onclick="setMode('study')">学習モード</button>
      <button id="tabAll" onclick="setMode('all')">全文（編集可）</button>
    </div>
    <div class="toolnote" style="margin-bottom:6px">ボタンを<b>タップ</b>で選択（選択中が色で表示）、<b>長押し</b>でルール表示。</div>
    <div id="studyArea"></div>
    <div id="allArea" class="hidden"></div>
    <button class="btn-ghost" style="width:100%;margin-top:4px" onclick="reset()">入力・保存一覧に戻る</button>
  </div>

</div>

<script>
/* ===================== 判定エンジン ===================== */
const VOWELS="aeiou", PLOSIVES="pbkgtd";
const WEAK_WORDS=new Set(["a","an","the","and","but","or","as","than","that",
  "to","of","for","from","at","in","on","with","by",
  "he","him","his","her","she","them","us","your","you","we","my","me",
  "was","were","is","are","am","be","been","do","does","can","could","would",
  "should","must","shall","will","had","has","have","there","some"]);
const stripPunct=w=>w.replace(/^[^A-Za-z']+|[^A-Za-z']+$/g,"");
const lastLetter=w=>stripPunct(w).toLowerCase().slice(-1);
const firstLetter=w=>(stripPunct(w).toLowerCase()[0]||"");
const isVowelStart=w=>VOWELS.includes(firstLetter(w));

function flapPositions(word){
  const w=stripPunct(word).toLowerCase(),res=[];
  for(let i=1;i<w.length-1;i++){
    if(w[i]==='t'&&VOWELS.includes(w[i-1])){
      if(VOWELS.includes(w[i+1]))res.push(i);
      else if(w[i+1]==='t'&&VOWELS.includes(w[i+2])){res.push(i);res.push(i+1);}
    }
  } return res;
}
function delCluster(word){
  const w=stripPunct(word).toLowerCase(); if(w.length<2)return null;
  const j=w.length-1;
  if(w[j]==='e'){ if(PLOSIVES.includes(w[j-1]))return[j-1,j]; return null; }
  if(PLOSIVES.includes(w[j]))return[j,j];
  return null;
}
function splitChunks(text){
  text=text.replace(/\s+/g," ").trim();
  return text.split(/(?<=[\.\?!,;:])\s+/).map(p=>p.trim()).filter(Boolean);
}
function analyze(chunk){
  const raw=chunk.split(" ").filter(Boolean), lc=raw.length-1;
  const tokens=raw.map((w,i)=>{
    const core=stripPunct(w), low=core.toLowerCase();
    const cap=i>0&&/^[A-Z]/.test(core)&&core.length>1;
    const weak=WEAK_WORDS.has(low)&&i!==lc&&!cap;
    return {raw:w,core,low,weak,flaps:flapPositions(w),del:delCluster(w)};
  });
  const gaps=[],delT=[];
  for(let i=0;i<tokens.length-1;i++){
    const a=tokens[i],b=tokens[i+1];let type=null;
    const la=lastLetter(a.raw),fb=firstLetter(b.raw);
    if(a.del&&fb&&!VOWELS.includes(fb)) delT.push(i);
    else if(la&&!VOWELS.includes(la)&&isVowelStart(b.raw)) type="link";
    gaps.push(type);
  }
  return {tokens,gaps,delTokens:new Set(delT)};
}

/* ===================== 保存（localStorage） ===================== */
const LS_KEY="shadowing_scripts_v1";
function loadSaved(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||[];}catch(e){return[];} }
function persist(list){ localStorage.setItem(LS_KEY,JSON.stringify(list)); }
function saveScript(name,text){
  const list=loadSaved();
  list.unshift({id:Date.now()+"",name:name||("無題 "+new Date().toLocaleString('ja-JP')),text,created:Date.now()});
  persist(list); return list;
}
function deleteScript(id){ persist(loadSaved().filter(s=>s.id!==id)); renderSavedList(); }
function moveScript(id,dir){
  const list=loadSaved(); const i=list.findIndex(s=>s.id===id);
  const j=i+dir; if(i<0||j<0||j>=list.length)return;
  [list[i],list[j]]=[list[j],list[i]]; persist(list); renderSavedList();
}
function renderSavedList(){
  const wrap=document.getElementById('savedListWrap'); const list=loadSaved();
  if(!list.length){ wrap.innerHTML=''; return; }
  let html='<div class="sec-title">保存したスクリプト</div>';
  list.forEach((s,idx)=>{
    const dt=new Date(s.created).toLocaleDateString('ja-JP');
    html+=`<div class="saved-row">
      <div style="display:flex;flex-direction:column">
        <button class="iconbtn" onclick="moveScript('${s.id}',-1)" ${idx===0?'disabled style=opacity:.3':''}>▲</button>
        <button class="iconbtn" onclick="moveScript('${s.id}',1)" ${idx===list.length-1?'disabled style=opacity:.3':''}>▼</button>
      </div>
      <div class="nm">${escapeHtml(s.name)}<div class="meta">${dt}</div></div>
      <button class="iconbtn go" onclick="openSaved('${s.id}')">開く</button>
      <button class="iconbtn danger" onclick="if(confirm('削除しますか？'))deleteScript('${s.id}')">🗑</button>
    </div>`;
  });
  wrap.innerHTML=html;
}
function escapeHtml(s){return s.replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function openSaved(id){ const s=loadSaved().find(x=>x.id===id); if(s)startPractice(s.text); }

/* ===================== 状態 ===================== */
let CHUNKS=[], MODE="study";
const SAMPLE="I'd like to stand up and take care of it. Could you give it to him, and tell her I'll see you later?";
function useSample(){ document.getElementById('scriptInput').value=SAMPLE; if(!document.getElementById('scriptName').value)document.getElementById('scriptName').value="サンプル"; }

function startPractice(text){
  CHUNKS=splitChunks(text).map(t=>({text:t,ana:analyze(t),tool:'flap',editTool:'flap',edit:null,
    user:{flap:new Set(),weak:new Set(),gap:{},del:new Set()},checked:false}));
  document.getElementById('inputView').classList.add('hidden');
  document.getElementById('practiceView').classList.remove('hidden');
  setMode('study');
}
function startOnly(){ const t=document.getElementById('scriptInput').value.trim(); if(!t){alert("スクリプトを入力してください");return;} startPractice(t); }
function saveAndStart(){
  const t=document.getElementById('scriptInput').value.trim();
  if(!t){alert("スクリプトを入力してください");return;}
  saveScript(document.getElementById('scriptName').value.trim(),t); startPractice(t);
}
function reset(){
  document.getElementById('practiceView').classList.add('hidden');
  document.getElementById('inputView').classList.remove('hidden');
  document.getElementById('scriptInput').value=""; document.getElementById('scriptName').value="";
  renderSavedList();
}

/* ===================== ツール＆ルール ===================== */
const TOOLS=[
  {id:'flap',name:'フラップt',cls:'t-flap',sym:'t̥',color:'var(--flap)',
   rule:'母音 + t + 母音 で t がダ行/ラ行の弱い音に',ex:'water → ウォラ / better → ベラ'},
  {id:'weak',name:'弱形',cls:'t-weak',sym:'∿',color:'var(--weak)',
   rule:'機能語を非常に弱く発音（文末など強調位置を除く）',ex:'him → イm / her → アー'},
  {id:'link',name:'連結',cls:'t-link',sym:'‿',color:'var(--link)',
   rule:'子音 + 母音 でつながる',ex:'stand up → スタンダッ / like it → ライキッ'},
  {id:'del',name:'消失',cls:'t-del',sym:'( )',color:'var(--del)',
   rule:'破裂音(p,b,k,g,t,d) + 子音 で破裂音が消える',ex:'good morning → グッモーニン / take care → テイケア'},
  {id:'erase',name:'消す',cls:'t-erase',sym:'⌫',color:'#555'},
];
function pickTool(ci,id,mode){
  if(mode==='all'){ CHUNKS[ci].editTool=id; renderAll(); }
  else { CHUNKS[ci].tool=id; renderStudy(); }
}
function showPopup(id){
  const t=TOOLS.find(x=>x.id===id); if(!t||!t.rule)return;
  document.getElementById('popupCard').innerHTML=
    `<div class="ttl"><span class="sym" style="color:${t.color}">${t.sym}</span>${t.name}</div>
     <div class="rl">${t.rule}</div><div class="ex">例: ${t.ex}</div>
     <div class="cl"><button onclick="hidePopup()">閉じる</button></div>`;
  document.getElementById('popup').classList.add('show');
}
function hidePopup(){ document.getElementById('popup').classList.remove('show'); }

function makeToolbar(ci,mode){
  const cur = mode==='all'?CHUNKS[ci].editTool:CHUNKS[ci].tool;
  const box=document.createElement('div');
  const bar=document.createElement('div'); bar.className='toolbar';
  TOOLS.forEach(t=>{
    const b=document.createElement('button');
    b.className='tbtn '+t.cls+(cur===t.id?' active':'')+(t.rule?' hasrule':'');
    b.innerHTML=`<span class="s">${t.sym}</span>${t.name}`;
    let timer=null, longed=false;
    const start=()=>{ longed=false; if(t.rule) timer=setTimeout(()=>{ longed=true; showPopup(t.id); },450); };
    const cancel=()=>{ if(timer){clearTimeout(timer);timer=null;} };
    b.addEventListener('touchstart',start,{passive:true});
    b.addEventListener('touchend',e=>{ cancel(); if(longed){e.preventDefault();} });
    b.addEventListener('touchmove',cancel,{passive:true});
    b.addEventListener('mousedown',start);
    b.addEventListener('mouseup',cancel);
    b.addEventListener('mouseleave',cancel);
    b.addEventListener('click',()=>{ if(longed){longed=false;return;} pickTool(ci,t.id,mode); });
    bar.appendChild(b);
  });
  box.appendChild(bar);
  const tt=TOOLS.find(x=>x.id===cur);
  const lab=document.createElement('div'); lab.className='sel-label';
  lab.innerHTML=`選択中: <b style="color:${tt.color}">${tt.sym} ${tt.name}</b>`;
  box.appendChild(lab);
  return box;
}

/* ===================== 単語スパン生成 ===================== */
function buildWord(tok,flapIdxSet,delOn,onChar){
  const wspan=document.createElement('span'); wspan.className='tok';
  const w=tok.raw,core=tok.core,start=w.indexOf(core),cl=tok.del;
  for(let k=0;k<w.length;k++){
    const coreIdx=k-start;
    if(delOn&&cl&&coreIdx===cl[0]){const o=document.createElement('span');o.className='paren';o.textContent='(';wspan.appendChild(o);}
    const ch=document.createElement('span'); ch.textContent=w[k];
    if(onChar) ch.onclick=e=>{e.stopPropagation();onChar(coreIdx);};
    if(coreIdx>=0&&flapIdxSet&&flapIdxSet.has(coreIdx)) ch.classList.add('m-flap');
    if(delOn&&cl&&coreIdx>=cl[0]&&coreIdx<=cl[1]) ch.classList.add('m-del-char');
    wspan.appendChild(ch);
    if(delOn&&cl&&coreIdx===cl[1]){const c=document.createElement('span');c.className='paren';c.textContent=')';wspan.appendChild(c);}
  }
  return wspan;
}
function flapIdxFor(set,ti){const s=new Set();set.forEach(k=>{const[a,b]=k.split(":");if(+a===ti)s.add(+b);});return s;}

/* ===================== モード切替 ===================== */
function setMode(m){
  MODE=m;
  document.getElementById('tabStudy').classList.toggle('active',m==='study');
  document.getElementById('tabAll').classList.toggle('active',m==='all');
  document.getElementById('studyArea').classList.toggle('hidden',m!=='study');
  document.getElementById('allArea').classList.toggle('hidden',m!=='all');
  if(m==='study')renderStudy(); else renderAll();
}

/* 現在モードに応じた 状態・ツール・再描画 */
function ctx(ci){
  const c=CHUNKS[ci];
  if(MODE==='all'){ ensureEdit(c); return {st:c.edit,tool:c.editTool,rerender:renderAll}; }
  return {st:c.user,tool:c.tool,rerender:renderStudy};
}
function ensureEdit(c){
  if(!c.edit){ const a=correctAnswers(c);
    c.edit={flap:new Set(a.flap),weak:new Set(a.weak),gap:Object.assign({},a.gap),del:new Set(a.del)}; }
}

/* ===================== 学習モード ===================== */
function renderStudy(){
  const area=document.getElementById('studyArea'); area.innerHTML="";
  CHUNKS.forEach((c,ci)=>{
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="chunk-num">塊 ${ci+1} / ${CHUNKS.length}</div>`;
    card.appendChild(makeToolbar(ci,'study'));
    const line=document.createElement('div'); line.className='chunk-text';
    c.ana.tokens.forEach((tok,ti)=>{
      const wspan=buildWord(tok,flapIdxFor(c.user.flap,ti),c.user.del.has(ti),
        coreIdx=>onCharTap(ci,ti,coreIdx));
      if(c.user.weak.has(ti)) wspan.classList.add('m-weak');
      wspan.addEventListener('click',()=>{ if(['weak','del','erase'].includes(c.tool))onWordTap(ci,ti); });
      line.appendChild(wspan);
      if(ti<c.ana.tokens.length-1){
        const g=document.createElement('span'); g.className='gap';
        if(c.user.gap[ti]==='link'){g.classList.add('link-on');g.textContent='‿';}else g.textContent='·';
        g.onclick=()=>onGapTap(ci,ti);
        line.appendChild(g);
      }
    });
    card.appendChild(line);
    const act=document.createElement('div'); act.className='actions';
    act.innerHTML=`<button class="btn-check" onclick="checkChunk(${ci})">答え合わせ</button>
                   <button class="btn-reveal" onclick="revealChunk(${ci})">答えを表示</button>`;
    card.appendChild(act);
    const res=document.createElement('div'); res.id='res'+ci;
    if(c.checked)res.innerHTML=c.resultHTML||"";
    card.appendChild(res);
    area.appendChild(card);
  });
}
function onCharTap(ci,ti,coreIdx){
  if(coreIdx<0)return; const {st,tool,rerender}=ctx(ci); const key=ti+":"+coreIdx;
  if(tool==='flap'){ st.flap.has(key)?st.flap.delete(key):st.flap.add(key); rerender(); }
  else if(tool==='erase'){ st.flap.delete(key); onWordTap(ci,ti); }
  else if(tool==='weak'||tool==='del'){ onWordTap(ci,ti); }
}
function onWordTap(ci,ti){
  const {st,tool,rerender}=ctx(ci);
  if(tool==='weak'){ st.weak.has(ti)?st.weak.delete(ti):st.weak.add(ti); rerender(); }
  else if(tool==='del'){ st.del.has(ti)?st.del.delete(ti):st.del.add(ti); rerender(); }
  else if(tool==='erase'){ st.weak.delete(ti);st.del.delete(ti); rerender(); }
}
function onGapTap(ci,ti){
  const {st,tool,rerender}=ctx(ci);
  if(tool==='link'){ st.gap[ti]=st.gap[ti]==='link'?null:'link'; rerender(); }
  else if(tool==='erase'){ st.gap[ti]=null; rerender(); }
}

/* ===================== 採点 ===================== */
function correctAnswers(c){
  const flap=new Set(),weak=new Set(),gap={},del=new Set(c.ana.delTokens);
  c.ana.tokens.forEach((tok,ti)=>{ tok.flaps.forEach(idx=>flap.add(ti+":"+idx)); if(tok.weak)weak.add(ti); });
  c.ana.gaps.forEach((g,i)=>{ if(g)gap[i]=g; });
  return {flap,weak,gap,del};
}
function checkChunk(ci){
  const c=CHUNKS[ci],ans=correctAnswers(c); let correct=0,total=0,misses=[];
  const wn=ti=>c.ana.tokens[ti].core;
  ans.flap.forEach(k=>{total++;if(c.user.flap.has(k))correct++;else misses.push('フラップt の付け忘れ: '+wn(+k.split(":")[0]));});
  c.user.flap.forEach(k=>{if(!ans.flap.has(k))misses.push('余分なフラップt');});
  ans.weak.forEach(k=>{total++;if(c.user.weak.has(k))correct++;else misses.push('弱形の付け忘れ: '+wn(k));});
  c.user.weak.forEach(k=>{if(!ans.weak.has(k))misses.push('余分な弱形: '+wn(k));});
  ans.del.forEach(k=>{total++;if(c.user.del.has(k))correct++;else misses.push('消失の付け忘れ: '+wn(k));});
  c.user.del.forEach(k=>{if(!ans.del.has(k))misses.push('余分な消失: '+wn(k));});
  Object.entries(ans.gap).forEach(([i,t])=>{total++;if(c.user.gap[i]===t)correct++;else misses.push('連結の付け忘れ: '+wn(+i)+'‿'+wn(+i+1));});
  Object.entries(c.user.gap).forEach(([i,t])=>{if(t&&ans.gap[i]!==t)misses.push('余分な連結');});
  const ok=misses.length===0, pct=total?Math.round(correct/total*100):100;
  let html=`<div class="result ${ok?'ok':'miss'}">`;
  html+= ok?`✅ 完璧！ ${correct}/${total} 正解`
           :`正解 ${correct}/${total}（${pct}%）<ul>`+[...new Set(misses)].map(m=>`<li>${m}</li>`).join("")+`</ul>`;
  html+=`</div>`;
  c.checked=true; c.resultHTML=html; document.getElementById('res'+ci).innerHTML=html;
}
function revealChunk(ci){
  const c=CHUNKS[ci],ans=correctAnswers(c);
  c.user.flap=new Set(ans.flap); c.user.weak=new Set(ans.weak); c.user.del=new Set(ans.del);
  c.user.gap={}; Object.entries(ans.gap).forEach(([i,t])=>c.user.gap[i]=t);
  renderStudy();
  setTimeout(()=>{const r=document.getElementById('res'+ci);if(r)r.innerHTML=`<div class="result ok">答えを表示しました。記号を確認しましょう。</div>`;},0);
}

/* ===================== 全文（編集可能） ===================== */
function renderAll(){
  const area=document.getElementById('allArea'); area.innerHTML="";
  CHUNKS.forEach((c,ci)=>{
    ensureEdit(c);
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="chunk-num">塊 ${ci+1} / ${CHUNKS.length} ・音声に合わせて記号を編集</div>`;
    card.appendChild(makeToolbar(ci,'all'));
    const line=document.createElement('div'); line.className='chunk-text';
    c.ana.tokens.forEach((tok,ti)=>{
      const wspan=buildWord(tok,flapIdxFor(c.edit.flap,ti),c.edit.del.has(ti),
        coreIdx=>onCharTap(ci,ti,coreIdx));
      if(c.edit.weak.has(ti)) wspan.classList.add('m-weak');
      wspan.addEventListener('click',()=>{ if(['weak','del','erase'].includes(c.editTool))onWordTap(ci,ti); });
      line.appendChild(wspan);
      if(ti<c.ana.tokens.length-1){
        const g=document.createElement('span'); g.className='gap';
        if(c.edit.gap[ti]==='link'){g.classList.add('link-on');g.textContent='‿';}else g.textContent='·';
        g.onclick=()=>onGapTap(ci,ti);
        line.appendChild(g);
      }
    });
    card.appendChild(line);
    const rb=document.createElement('button'); rb.className='btn-reveal';
    rb.style.cssText='width:100%;margin-top:8px;padding:8px;font-size:12px';
    rb.textContent='自動判定に戻す';
    rb.onclick=()=>{ c.edit=null; renderAll(); };
    card.appendChild(rb);
    area.appendChild(card);
  });
}

renderSavedList();
</script>
